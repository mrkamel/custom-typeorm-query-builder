services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - '5544:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d test']
      interval: 1s
      timeout: 5s
      retries: 30
